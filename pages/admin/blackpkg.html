<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>黑名单包名/名称管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/element/css/index.css" />
  <script src="/element/js/vue.global.js"></script>
  <script src="/element/js/index.full.js"></script>
  <script src="/config.js"></script>
  <style>
    body { padding: 20px; }
    .toolbar { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div id="app">
    <el-alert
      title="添加后，此应用就无法再上传，可将一下无法注入的应用，或者禁止注入的应用包名加在这里，比如大厂的一些APP，番茄小说，剪映什么的"
      type="error"
      style="margin-bottom: 20px;">
    </el-alert>
    
    <div class="toolbar">
      <el-button type="primary" @click="openAdd">添加黑名单包名/应用名称</el-button>
    </div>

    <el-table :data="list" border style="width: 100%">
      <el-table-column prop="id" label="ID" width="60"></el-table-column>
      <el-table-column prop="package" label="包名/应用名"></el-table-column>
      <el-table-column prop="remark" label="备注"></el-table-column>
      <el-table-column prop="message" label="禁止原因"></el-table-column>
      <el-table-column prop="upload_time" label="创建时间" width="180"></el-table-column>
      <el-table-column label="操作" width="160">
        <template #default="scope">
          <el-button size="small" @click="openEdit(scope.row)">编辑</el-button>
          <el-button size="small" type="danger" @click="deleteRow(scope.row)">删除</el-button>
        </template>
      </el-table-column>
    </el-table>

    <el-pagination
      style="margin-top: 20px"
      layout="total, prev, pager, next"
      :total="total"
      :page-size="limit"
      :current-page="page"
      @current-change="changePage"
    ></el-pagination>

    <!-- 弹窗 -->
    <el-dialog v-model="dialogVisible" :title="dialogTitle" width="500px">
      <el-form :model="form" label-width="100px">
        <el-form-item label="包名/应用名">
          <el-input v-model="form.package" :disabled="!!form.id"></el-input>
        </el-form-item>
        <el-form-item label="备注">
          <el-input v-model="form.remark"></el-input>
        </el-form-item>
        <el-form-item label="禁止原因">
          <el-input v-model="form.message"></el-input>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="dialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitForm">提交</el-button>
      </template>
    </el-dialog>
  </div>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        const list = ref([]);
        const page = ref(1);
        const limit = ref(20);
        const total = ref(0);
        const dialogVisible = ref(false);
        const dialogTitle = ref('');
        const form = reactive({
          id: null,
          package: '',
          remark: '',
          message: '禁止上传该应用'
        });

        function resetForm() {
          form.id = null;
          form.package = '';
          form.remark = '';
          form.message = '禁止上传该应用';
        }

        async function loadData() {
          const res = await fetch(`/api/index.php?module=blckage&method=getblckagepkg`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ page: page.value, limit: limit.value })
          });
          const json = await res.json();
          if (json.code === 200) {
            list.value = json.data.list;
            total.value = json.data.total;
            limit.value = json.data.limit;
            page.value = json.data.page;
          } else {
            ElementPlus.ElMessage.error(json.message || '加载失败');
          }
        }

        function changePage(p) {
          page.value = p;
          loadData();
        }

        function openAdd() {
          dialogTitle.value = '添加黑名单';
          resetForm();
          dialogVisible.value = true;
        }

        function openEdit(row) {
          dialogTitle.value = '编辑黑名单';
          form.id = row.id;
          form.package = row.package;
          form.remark = row.remark;
          form.message = row.message;
          dialogVisible.value = true;
        }

        async function submitForm() {
          if (!form.package) {
            ElementPlus.ElMessage.warning('请填写包名/应用名称');
            return;
          }

          const url = form.id
            ? `/api/index.php?module=blckage&method=updateblckagepkg`
            : `/api/index.php?module=blckage&method=addblckagepkg`;

          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form)
          });

          const json = await res.json();
          if (json.code === 200) {
            ElementPlus.ElMessage.success('保存成功');
            dialogVisible.value = false;
            loadData();
          } else {
            ElementPlus.ElMessage.error(json.message || '保存失败');
          }
        }

        async function deleteRow(row) {
          ElementPlus.ElMessageBox.confirm(`确认删除「${row.package}」规则吗？`, '提示', { type: 'warning' })
            .then(async () => {
              const res = await fetch(`/api/index.php?module=blckage&method=deleteblckagepkg`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: row.id })
              });
              const json = await res.json();
              if (json.code === 200) {
                ElementPlus.ElMessage.success('删除成功');
                loadData();
              } else {
                ElementPlus.ElMessage.error(json.message || '删除失败');
              }
            }).catch(() => {});
        }

        onMounted(loadData);

        return {
          list,
          page,
          limit,
          total,
          dialogVisible,
          dialogTitle,
          form,
          openAdd,
          openEdit,
          submitForm,
          deleteRow,
          changePage
        };
      }
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
