<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>静默配置</title>
  <link rel="stylesheet" href="/element/css/index.css">
  <script src="/element/js/vue.global.js"></script>
  <script src="/element/js/index.full.js"></script>
</head>
<body>
<div id="app" style="padding: 20px">

  <el-alert title="可检测设备上是否安装过指定应用,然后对其做不同的操作" type="info" style="margin-bottom: 20px"></el-alert>

  <div style="margin-bottom: 20px; display: flex; gap: 10px">
    <el-select v-model="selectedAppId" placeholder="选择应用" style="width: 300px" @change="loadList">
      <el-option v-for="app in appList" :key="app.id" :label="`${app.name} | ${app.version}`" :value="app.id"></el-option>
    </el-select>
    <el-button @click="loadApps">刷新应用列表</el-button>
    <el-button type="primary" @click="openAddDialog">添加检测规则</el-button>
  </div>

    <el-table :data="list" border>
      <el-table-column label="ID" prop="id" width="80"></el-table-column>
      <el-table-column label="包名" prop="package_name"></el-table-column>
      <el-table-column label="检测类型" prop="detect_type">
        <template #default="{ row }">
          <span>{{ row.detect_type == 0 ? '检测到包名存在' : '检测到包名不存在' }}</span>
        </template>
      </el-table-column>
      <el-table-column label="执行事件" prop="action_type">
        <template #default="{ row }">
          <span>
            {{
              row.action_type == 0 ? '不加载壳功能'
              : row.action_type == 1 ? '结束运行'
              : row.action_type == 2 ? '弹出提示'
              : row.action_type == 3 ? '提示并结束运行'
              : '未知'
            }}
          </span>
        </template>
      </el-table-column>
      <el-table-column label="弹出提示" prop="tip_text"></el-table-column>
      <el-table-column label="备注" prop="remark"></el-table-column>
      <el-table-column label="创建时间" prop="created_at"></el-table-column>
      <el-table-column label="操作" width="220">
        <template v-slot="scope">
          <el-button size="small" @click="editRow(scope.row)">编辑</el-button>
          <el-button size="small" type="danger" @click="deleteRow(scope.row)">删除</el-button>
        </template>
      </el-table-column>
    </el-table>


  <!-- 添加/编辑弹窗 -->
  <el-dialog v-model="dialogVisible" :title="editMode ? '编辑规则' : '添加规则'">
      <el-form :model="form" label-width="100px">
        
        <!-- 包名 -->
        <el-form-item label="包名">
          <el-select
            v-model="form.package_name"
            filterable
            allow-create
            default-first-option
            placeholder="请选择或输入包名"
            style="width: 100%">
            <el-option
              v-for="item in commonPackages"
              :key="item.package"
              :label="`${item.package} - ${item.label}`"
              :value="item.package">
            </el-option>
          </el-select>
        </el-form-item>
    
        <!-- 检测类型 -->
        <el-form-item label="检测类型">
          <el-select v-model="form.detect_type" placeholder="请选择">
            <el-option label="检测到包名存在" :value="0"></el-option>
            <el-option label="检测到包名不存在" :value="1"></el-option>
          </el-select>
        </el-form-item>
    
        <!-- 执行事件 -->
        <el-form-item label="执行事件">
          <el-select v-model="form.action_type" placeholder="请选择">
            <el-option label="不加载任何壳功能" :value="0"></el-option>
            <el-option label="结束运行" :value="1"></el-option>
            <el-option label="弹出提示" :value="2"></el-option>
            <el-option label="弹出提示并结束运行" :value="3"></el-option>
          </el-select>
        </el-form-item>
    
        <!-- 提示内容（仅在 action_type 为 2 或 3 时显示） -->
        <el-form-item v-if="form.action_type === 2 || form.action_type === 3" label="提示内容">
          <el-input v-model="form.tip_text" type="textarea" rows="3" placeholder="请输入弹出提示内容"></el-input>
        </el-form-item>
    
        <!-- 备注 -->
        <el-form-item label="备注">
          <el-input v-model="form.remark" type="textarea" rows="3"></el-input>
        </el-form-item>
    
      </el-form>
    
      <template #footer>
        <el-button @click="dialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitForm">确定</el-button>
      </template>
    </el-dialog>


</div>

<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const appList = ref([]);
    const selectedAppId = ref(null);
    const list = ref([]);
    const dialogVisible = ref(false);
    const editMode = ref(false);
    const form = reactive({
      id: null,
      package_name: '',
      detect_type: 0,
      action_type: 0,
      tip_text: '',
      remark: ''
    });


    const commonPackages = [
      { package: 'bin.mt.plus.canary', label: 'MT管理器（高级破解版）' },
      { package: 'bin.mt.plus', label: 'MT管理器（高级版）' },
      { package: 'bin.mt.apksigner', label: 'MT签名工具' },
      { package: 'ru.maximoff.apktool', label: 'ApktoolM（反编译工具）' },
      { package: 'org.jf.apktool', label: 'Apktool（反编译工具）' },
      { package: 'com.aide.ui', label: 'AIDE（安卓集成开发环境）' },
      { package: 'com.aide.engine', label: 'AIDE 引擎组件' },
      { package: 'com.aide.web', label: 'AIDE Web' },
      { package: 'com.aide.ui.build', label: 'AIDE 构建工具' },
      { package: 'com.aide.common', label: 'AIDE 公共组件' },
      { package: 'com.sketchware.remake', label: 'Sketchware（可视化编程）' },
      { package: 'com.gmail.heagoo.apkeditor', label: 'APK Editor（应用编辑器）' },
      { package: 'com.gmail.heagoo.apkeditor.pro', label: 'APK Editor Pro（专业版）' },
      { package: 'com.jd.jrapp', label: 'Jadx GUI（反编译浏览工具）' },
    
      { package: 'com.topjohnwu.magisk', label: 'Magisk工具' },
      { package: 'com.noshufou.android.su', label: '超级用户管理器' },
      { package: 'eu.chainfire.supersu', label: 'SuperSU' },
      { package: 'com.koushikdutta.superuser', label: 'Superuser' },
      { package: 'com.zachspong.temprootremovejb', label: '临时ROOT清除工具' },
      { package: 'com.devadvance.rootcloak', label: 'Root隐藏器' },
      { package: 'com.saurik.substrate', label: 'Cydia Substrate' },
      { package: 'de.robv.android.xposed.installer', label: 'Xposed框架' },
      { package: 'com.android.vending.billing.InAppBillingService.COIN', label: 'Google支付劫持' },
      { package: 'com.luckypatchers.luckypatcherinstaller', label: 'Lucky Patcher' },
      { package: 'com.frida.fridaagent', label: 'Frida工具' },
      { package: 're.frida.server', label: 'Frida服务端' },
      { package: 'com.xposed.installer', label: 'Xposed安装器' },
      { package: 'com.tencent.mobileqq', label: 'QQ' },
      { package: 'com.termux', label: 'Termux终端模拟器' },
      { package: 'com.google.android.apps.translate', label: 'Google翻译' }
    ];


    async function loadApps() {
      const res = await fetch('/api/index.php?module=config&method=getMyApps');
      const json = await res.json();
      if (json.code === 200) appList.value = json.data;
    }

    async function loadList() {
      if (!selectedAppId.value) return;
      const res = await fetch('/api/index.php?module=sensitive&method=getList', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apk_id: selectedAppId.value })
      });
      const json = await res.json();
      list.value = json.data || [];
    }

    function openAddDialog() {
        if (!selectedAppId.value) {
            ElementPlus.ElMessage.warning('请先选择应用');
            return;
          }
      editMode.value = false;
      Object.assign(form, { id: null, package_name: '', remark: '' });
      dialogVisible.value = true;
    }

    function editRow(row) {
      editMode.value = true;
      Object.assign(form, {
        id: parseInt(row.id),
        package_name: row.package_name,
        detect_type: Number(row.detect_type),
        action_type: Number(row.action_type),
        tip_text: row.tip_text || '',
        remark: row.remark || ''
      });
      dialogVisible.value = true;
    }

    async function submitForm() {
      if (!form.package_name) {
        ElementPlus.ElMessage.error('包名不能为空');
        return;
      }

      const method = editMode.value ? 'edit' : 'add';
      const payload = { ...form, apk_id: selectedAppId.value };
      const res = await fetch(`/api/index.php?module=sensitive&method=${method}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (json.code === 200) {
        ElementPlus.ElMessage.success(json.message || '保存成功');
        dialogVisible.value = false;
        loadList();
      }
    }

    async function deleteRow(row) {
      await ElementPlus.ElMessageBox.confirm(`确认删除包名：${row.package_name}？`, '警告');
      await fetch('/api/index.php?module=sensitive&method=delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: row.id })
      });
      loadList();
    }

    onMounted(loadApps);

    return {
      appList,
      selectedAppId,
      list,
      dialogVisible,
      editMode,
      form,
      openAddDialog,
      editRow,
      submitForm,
      deleteRow,
      commonPackages,
      loadList
    };
  }
}).use(ElementPlus).mount('#app');
</script>

</body>
</html>
