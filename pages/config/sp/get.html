<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>SP读取劫持配置</title>
  <link rel="stylesheet" href="/element/css/index.css">
  <script src="/element/js/vue.global.js"></script>
  <script src="/element/js/index.full.js"></script>
</head>
<body>
<div id="app" style="padding: 20px">
<el-alert
  title="SP数据劫持说明"
  type="info"
  show-icon
  style="margin-bottom: 20px"
  description="SP是SharedPreferences的缩写，用于存储APP的本地配置数据。此功能可劫持应用读取的SP配置或返回的值，实现特定功能注入或数据干预。">
</el-alert>
  <div style="margin-bottom: 20px; display: flex; gap: 10px">
    <el-select v-model="selectedAppId" placeholder="选择应用" style="width: 300px" @change="loadList">
      <el-option v-for="app in appList" :key="app.id" :label="`${app.name} | ${app.version}`" :value="app.id"></el-option>
    </el-select>
    <el-button @click="loadApps">刷新应用列表</el-button>
    <el-button type="primary" @click="openAddDialog">添加SP配置</el-button>
  </div>

  <el-table :data="list" border>
    <el-table-column label="ID" prop="id" width="80"></el-table-column>
    <el-table-column label="SP名称" prop="sp_name"></el-table-column>
    <el-table-column label="创建时间" prop="created_at"></el-table-column>
    <el-table-column label="操作" width="300">
      <template v-slot="scope">
        <el-button size="small" @click="editRow(scope.row)">编辑</el-button>
        <el-button size="small" @click="manageKeys(scope.row)">键值管理</el-button>
        <el-button size="small" type="danger" @click="deleteRow(scope.row)">删除</el-button>
      </template>
    </el-table-column>
  </el-table>

  <!-- 添加/编辑弹窗 -->
  <el-dialog v-model="dialogVisible" :title="editMode ? '编辑SP配置' : '添加SP配置'">
    <el-form :model="form" label-width="100px">
      <el-form-item label="SP名称">
        <el-input v-model="form.sp_name" />
      </el-form-item>
    </el-form>
    <template #footer>
      <el-button @click="dialogVisible = false">取消</el-button>
      <el-button type="primary" @click="submitForm">确定</el-button>
    </template>
  </el-dialog>

  <!-- 键值管理弹窗 -->
  <el-dialog v-model="keyDialogVisible" title="键值管理" width="600px">
    <el-button type="primary" @click="openAddKey">添加键值</el-button>
    <el-table :data="keyList" style="margin-top: 10px">
      <el-table-column label="键名" prop="key_name"></el-table-column>
      <el-table-column label="键值" prop="key_value"></el-table-column>
      <el-table-column label="类型" prop="type"></el-table-column>
      <el-table-column label="操作">
        <template v-slot="scope">
          <el-button size="small" @click="editKey(scope.row)">编辑</el-button>
          <el-button size="small" type="danger" @click="deleteKey(scope.row)">删除</el-button>
        </template>
      </el-table-column>
    </el-table>
  </el-dialog>

  <!-- 添加/编辑键值弹窗 -->
  <el-dialog v-model="keyFormDialogVisible" :title="keyEditMode ? '编辑键值' : '添加键值'">
    <el-form :model="keyForm" label-width="100px">
      <el-form-item label="键名">
        <el-input v-model="keyForm.key_name" />
      </el-form-item>
      <el-form-item label="键值">
        <el-input v-model="keyForm.key_value" />
      </el-form-item>
      
      <el-form-item label="类型">
      <el-select v-model="keyForm.type" placeholder="请选择数据类型">
        <el-option label="String" value="String"></el-option>
        <el-option label="Integer" value="Integer"></el-option>
        <el-option label="Boolean" value="Boolean"></el-option>
        <el-option label="Long" value="Long"></el-option>
        <el-option label="Float" value="Float"></el-option>
        <el-option label="Set<String>" value="Set<String>"></el-option>
      </el-select>
    </el-form-item>
    
    </el-form>
    <template #footer>
      <el-button @click="keyFormDialogVisible = false">取消</el-button>
      <el-button type="primary" @click="submitKeyForm">确定</el-button>
    </template>
  </el-dialog>
</div>

<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const appList = ref([]);
    const selectedAppId = ref(null);
    const list = ref([]);
    const form = reactive({ id: null, sp_name: '' });
    const dialogVisible = ref(false);
    const editMode = ref(false);
    const keyDialogVisible = ref(false);
    const keyFormDialogVisible = ref(false);
    const currentNameId = ref(null);
    const keyList = ref([]);
    const keyForm = reactive({ id: null, key_name: '', key_value: '' });
    const keyEditMode = ref(false);

    async function loadApps() {
      const res = await fetch('/api/index.php?module=config&method=getMyApps');
      const json = await res.json();
      if (json.code === 200) appList.value = json.data;
    }

    async function loadList() {
      if (!selectedAppId.value) return;
      const res = await fetch('/api/index.php?module=sp_get&method=getList', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apk_id: selectedAppId.value })
      });
      const json = await res.json();
      list.value = json.data || [];
    }

    function openAddDialog() {
        if (!selectedAppId.value) {
            ElementPlus.ElMessage.warning('请先选择应用');
            return;
          }
      editMode.value = false;
      Object.assign(form, { id: null, sp_name: '' });
      dialogVisible.value = true;
    }

    function editRow(row) {
      editMode.value = true;
      Object.assign(form, row);
      dialogVisible.value = true;
    }

    async function submitForm() {
      const method = editMode.value ? 'edit' : 'add';
      const payload = { ...form, apk_id: selectedAppId.value };
      const res = await fetch(`/api/index.php?module=sp_get&method=${method}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (json.code === 200) {
        ElementPlus.ElMessage.success(json.message || '成功');
        dialogVisible.value = false;
        loadList();
      }
    }

    async function deleteRow(row) {
      try {
        await ElementPlus.ElMessageBox.confirm(
          `确认删除SP配置：${row.sp_name}？`,
          '提示',
          { type: 'warning' }
        );
        await fetch('/api/index.php?module=sp_get&method=delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: row.id })
        });
        ElementPlus.ElMessage.success('删除成功');
        loadList();
      } catch (e) {
        // 用户取消，无需处理
      }
    }


    async function manageKeys(row) {
      currentNameId.value = row.id;
      const res = await fetch('/api/index.php?module=sp_get&method=getKeys', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name_id: row.id })
      });
      const json = await res.json();
      keyList.value = json.data;
      keyDialogVisible.value = true;
    }

    function openAddKey() {
      keyEditMode.value = false;
      Object.assign(keyForm, { id: null, key_name: '', key_value: '' });
      keyFormDialogVisible.value = true;
    }

    function editKey(row) {
      keyEditMode.value = true;
      Object.assign(keyForm, row);
      keyFormDialogVisible.value = true;
    }

    async function submitKeyForm() {
      const method = keyEditMode.value ? 'editKey' : 'addKey';
      const payload = { ...keyForm, name_id: currentNameId.value };
      const res = await fetch(`/api/index.php?module=sp_get&method=${method}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (json.code === 200) {
        ElementPlus.ElMessage.success('保存成功');
        keyFormDialogVisible.value = false;
        manageKeys({ id: currentNameId.value });
      }
    }

    async function deleteKey(row) {
      await fetch('/api/index.php?module=sp_get&method=deleteKey', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: row.id })
      });
      manageKeys({ id: currentNameId.value });
    }

    onMounted(loadApps);

    return {
      appList,
      selectedAppId,
      list,
      form,
      dialogVisible,
      editMode,
      openAddDialog,
      editRow,
      submitForm,
      deleteRow,
      keyDialogVisible,
      keyList,
      manageKeys,
      openAddKey,
      editKey,
      keyFormDialogVisible,
      keyForm,
      submitKeyForm,
      deleteKey,
      loadList
    };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
