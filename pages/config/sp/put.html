<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>SP 数据劫持配置</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/element/css/index.css">
  <script src="/element/js/vue.global.js"></script>
  <script src="/element/js/index.full.js"></script>
</head>
<body>
  <div id="app" style="padding: 20px">
      <el-alert
  title="SP数据劫持说明"
  type="info"
  show-icon
  style="margin-bottom: 20px"
  description="SP是SharedPreferences的缩写，用于存储APP的本地配置数据。此功能可劫持应用写入的SP配置或返回的值，实现特定功能注入或数据干预。">
</el-alert>
    <div style="margin-bottom: 20px; display: flex; gap: 10px">
      <el-select v-model="selectedAppId" placeholder="选择应用" style="width: 300px" @change="loadSPList">
        <el-option v-for="app in appList" :key="app.id" :label="`${app.name} | ${app.version}`" :value="app.id"></el-option>
      </el-select>
      <el-button @click="loadApps">刷新应用列表</el-button>
      <el-button type="primary" @click="openAddSP">添加SP数据</el-button>
    </div>

    <el-table :data="spList" border>
      <el-table-column prop="id" label="ID" width="60"></el-table-column>
      <el-table-column prop="sp_name" label="SP 名称"></el-table-column>
      <el-table-column label="操作" width="300">
        <template v-slot="scope">
          <el-button size="small" type="primary" @click="editSP(scope.row)">编辑</el-button>
          <el-button size="small" type="warning" @click="manageKeys(scope.row)">键值管理</el-button>
          <el-button size="small" type="danger" @click="deleteSP(scope.row)">删除</el-button>
        </template>
      </el-table-column>
    </el-table>

    <!-- 添加/编辑SP数据 -->
    <el-dialog v-model="spDialogVisible" :title="spEditMode ? '编辑SP数据' : '添加SP数据'" width="500px">
      <el-form :model="spForm" label-width="100px">
        <el-form-item label="SP名称">
          <el-input v-model="spForm.sp_name" placeholder="请输入SP名称"></el-input>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="spDialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitSP">保存</el-button>
      </template>
    </el-dialog>

    <!-- 键值管理 -->
    <el-dialog v-model="keyDialogVisible" title="键值管理" width="600px">
      <el-button type="primary" @click="openAddKey">添加键值</el-button>
      <el-table :data="keyList" style="margin-top: 10px" border>
        <el-table-column prop="key_name" label="键名"></el-table-column>
        <el-table-column prop="key_value" label="键值"></el-table-column>
        <el-table-column label="类型" prop="type"></el-table-column>
        <el-table-column label="操作">
          <template v-slot="scope">
            <el-button size="small" type="primary" @click="editKey(scope.row)">编辑</el-button>
            <el-button size="small" type="danger" @click="deleteKey(scope.row)">删除</el-button>
          </template>
        </el-table-column>
      </el-table>
    </el-dialog>

    <!-- 添加/编辑键值 -->
    <el-dialog v-model="keyFormDialogVisible" :title="keyEditMode ? '编辑键值' : '添加键值'" width="500px">
      <el-form :model="keyForm" label-width="100px">
        <el-form-item label="键名">
          <el-input v-model="keyForm.key_name"></el-input>
        </el-form-item>
        <el-form-item label="键值">
          <el-input v-model="keyForm.key_value"></el-input>
        </el-form-item>
        
        <el-form-item label="类型">
          <el-select v-model="keyForm.type" placeholder="请选择数据类型">
            <el-option label="String" value="String"></el-option>
            <el-option label="Integer" value="Integer"></el-option>
            <el-option label="Boolean" value="Boolean"></el-option>
            <el-option label="Long" value="Long"></el-option>
            <el-option label="Float" value="Float"></el-option>
            <el-option label="Set<String>" value="Set<String>"></el-option>
          </el-select>
        </el-form-item>
        
      </el-form>
      <template #footer>
        <el-button @click="keyFormDialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitKey">保存</el-button>
      </template>
    </el-dialog>

  </div>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        const appList = ref([]);
        const selectedAppId = ref(null);
        const spList = ref([]);
        const keyList = ref([]);
        const spDialogVisible = ref(false);
        const spEditMode = ref(false);
        const spForm = reactive({ id: null, sp_name: '' });
        const keyDialogVisible = ref(false);
        const keyFormDialogVisible = ref(false);
        const keyEditMode = ref(false);
        const keyForm = reactive({ id: null, key_name: '', key_value: '' });
        const currentSpId = ref(null);

        async function loadApps() {
          const res = await fetch('/api/index.php?module=config&method=getMyApps');
          const json = await res.json();
          if (json.code === 200) appList.value = json.data;
        }

        async function loadSPList() {
          if (!selectedAppId.value) return;
          const res = await fetch('/api/index.php?module=sp_put&method=getList', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ apk_id: selectedAppId.value })
          });
          const json = await res.json();
          spList.value = json.data;
        }

        function openAddSP() {
          if (!selectedAppId.value) {
            ElementPlus.ElMessage.warning('请先选择应用');
            return;
          }
          spEditMode.value = false;
          Object.assign(spForm, { id: null, sp_name: '' });
          spDialogVisible.value = true;
        }

        function editSP(row) {
          spEditMode.value = true;
          Object.assign(spForm, { ...row });
          spDialogVisible.value = true;
        }

        async function submitSP() {
          const url = spEditMode.value
            ? '/api/index.php?module=sp_put&method=edit'
            : '/api/index.php?module=sp_put&method=add';
          const payload = { ...spForm, apk_id: selectedAppId.value };
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const json = await res.json();
          if (json.code === 200) {
            ElementPlus.ElMessage.success('保存成功');
            spDialogVisible.value = false;
            loadSPList();
          }
        }

        async function deleteSP(row) {
          await ElementPlus.ElMessageBox.confirm(`确定删除SP项：${row.sp_name}?`, '警告');
          const res = await fetch('/api/index.php?module=sp_put&method=deleteSpName', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: row.id })
          });
          const json = await res.json();
          if (json.code === 200) {
            ElementPlus.ElMessage.success('删除成功');
            loadSPList();
          }
        }

        async function manageKeys(row) {
          currentSpId.value = row.id;
          const res = await fetch('/api/index.php?module=sp_put&method=getKeys', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name_id: row.id })
          });
          const json = await res.json();
          keyList.value = json.data;
          keyDialogVisible.value = true;
        }

        function openAddKey() {
          keyEditMode.value = false;
          Object.assign(keyForm, { id: null, key_name: '', key_value: '' });
          keyFormDialogVisible.value = true;
        }

        function editKey(row) {
          keyEditMode.value = true;
          Object.assign(keyForm, { ...row });
          keyFormDialogVisible.value = true;
        }

        async function submitKey() {
          const url = keyEditMode.value
            ? '/api/index.php?module=sp_put&method=editKey'
            : '/api/index.php?module=sp_put&method=addKey';
          const payload = {
            ...keyForm,
            name_id: currentSpId.value
          };
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const json = await res.json();
          if (json.code === 200) {
            ElementPlus.ElMessage.success('保存成功');
            keyFormDialogVisible.value = false;
            manageKeys({ id: currentSpId.value });
          }
        }

        async function deleteKey(row) {
          const res = await fetch('/api/index.php?module=sp_put&method=deleteKey', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: row.id })
          });
          const json = await res.json();
          if (json.code === 200) {
            ElementPlus.ElMessage.success('删除成功');
            manageKeys({ id: currentSpId.value });
          }
        }

        onMounted(loadApps);

        return {
          appList, selectedAppId, spList, loadSPList, loadApps,
          openAddSP, editSP, submitSP, deleteSP, spDialogVisible, spForm, spEditMode,
          manageKeys, keyList, keyDialogVisible, keyForm, openAddKey,
          editKey, keyFormDialogVisible, submitKey, deleteKey
        };
      }
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
