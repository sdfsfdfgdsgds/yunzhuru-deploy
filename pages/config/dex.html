<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>远程DEX配置</title>
  <link rel="stylesheet" href="/element/css/index.css">
  <script src="/element/js/vue.global.js"></script>
  <script src="/element/js/index.full.js"></script>
</head>
<body>
<div id="app" style="padding: 20px">

  <el-alert title="远程DEX配置：配置远程类与方法，应用启动时将动态加载远程DEX文件并调用指定方法" type="info" style="margin-bottom: 20px"></el-alert>
  <el-alert title="DEX类的启动方法必须接收一个context,否则无法加载,远程dex类的启动是在主线程完成的,可直接用UI,如果有其他操作,请自行在子线程完成" type="info" style="margin-bottom: 20px"></el-alert>

  <div style="margin-bottom: 20px; display: flex; gap: 10px">
    <el-select v-model="selectedAppId" placeholder="选择应用" style="width: 300px" @change="loadList">
      <el-option v-for="app in appList" :key="app.id" :label="`${app.name} | ${app.version}`" :value="app.id"></el-option>
    </el-select>
    <el-button @click="loadApps">刷新应用列表</el-button>
    <el-button type="primary" @click="openAddDialog">添加远程DEX规则</el-button>
  </div>

  <el-table :data="list" border>
    <el-table-column label="ID" prop="id" width="80"></el-table-column>
    <el-table-column label="地址" prop="url"></el-table-column>
    <el-table-column label="类名" prop="class_name"></el-table-column>
    <el-table-column label="方法名" prop="method_name"></el-table-column>
    <el-table-column label="启用" prop="enabled" width="80">
      <template v-slot="scope">
        <el-tag :type="scope.row.enabled ? 'success' : 'info'">{{ scope.row.enabled ? '是' : '否' }}</el-tag>
      </template>
    </el-table-column>
    <el-table-column label="备注" prop="remark"></el-table-column>
    <el-table-column label="创建时间" prop="created_at"></el-table-column>
    <el-table-column label="操作" width="220">
      <template v-slot="scope">
        <el-button size="small" @click="editRow(scope.row)">编辑</el-button>
        <el-button size="small" type="danger" @click="deleteRow(scope.row)">删除</el-button>
      </template>
    </el-table-column>
  </el-table>

  <el-dialog v-model="dialogVisible" :title="editMode ? '编辑规则' : '添加规则'">
    <el-form :model="form" label-width="100px">
      <el-form-item label="远程地址">
        <el-input v-model="form.url" placeholder="请输入远程DEX地址"></el-input>
        <div style="color: red; margin-top: 5px;">dex文件可以上传到图床中,后缀格式不影响调用,前提是图床不会压缩文件,否则可能dex损坏</div>
      </el-form-item>
      <el-form-item label="类名">
        <el-input v-model="form.class_name" placeholder="如 com.example.MyClass"></el-input>
      </el-form-item>
      <el-form-item label="方法名">
        <el-input v-model="form.method_name" placeholder="如 doWork"></el-input>
        <div style="color: red; margin-top: 5px;">此方法为启动方法，必须接受一个 Context 参数(只接收这一个参数),否则无法加载</div>
        <div style="color: red; margin-top: 5px;">这个Context是Application的上下文,不能用于启动Activity</div>
      </el-form-item>
      <el-form-item label="启用">
        <el-switch v-model="form.enabled"></el-switch>
      </el-form-item>
      <el-form-item label="备注">
        <el-input v-model="form.remark" type="textarea" rows="3"></el-input>
      </el-form-item>
    </el-form>
    <template #footer>
      <el-button @click="dialogVisible = false">取消</el-button>
      <el-button type="primary" @click="submitForm">确定</el-button>
    </template>
  </el-dialog>

</div>

<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const appList = ref([]);
    const selectedAppId = ref(null);
    const list = ref([]);
    const dialogVisible = ref(false);
    const editMode = ref(false);
    const form = reactive({
      id: null,
      url: '',
      class_name: '',
      method_name: '',
      enabled: 0,
      remark: ''
    });

    async function loadApps() {
      const res = await fetch('/api/index.php?module=config&method=getMyApps');
      const json = await res.json();
      if (json.code === 200) appList.value = json.data;
    }

    async function loadList() {
      if (!selectedAppId.value) return;
      const res = await fetch('/api/index.php?module=dex&method=getList', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apk_id: selectedAppId.value })
      });
      const json = await res.json();
      list.value = json.data || [];
    }

    function openAddDialog() {
      if (!selectedAppId.value) {
        ElementPlus.ElMessage.warning('请先选择应用');
        return;
      }
      editMode.value = false;
      Object.assign(form, {
        id: null,
        url: '',
        class_name: '',
        method_name: '',
        enabled: 0,
        remark: ''
      });
      dialogVisible.value = true;
    }

    function editRow(row) {
      editMode.value = true;
      Object.assign(form, row);
      dialogVisible.value = true;
    }

    async function submitForm() {
      if (!form.url || !form.class_name || !form.method_name) {
        ElementPlus.ElMessage.error('地址、类名和方法名不能为空');
        return;
      }

      const method = editMode.value ? 'edit' : 'add';
      const payload = { ...form, apk_id: selectedAppId.value };
      const res = await fetch(`/api/index.php?module=dex&method=${method}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (json.code === 200) {
        ElementPlus.ElMessage.success(json.message || '保存成功');
        dialogVisible.value = false;
        loadList();
      }
    }

    async function deleteRow(row) {
      await ElementPlus.ElMessageBox.confirm(`确认删除ID：${row.id}？`, '警告');
      await fetch('/api/index.php?module=dex&method=delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: row.id })
      });
      loadList();
    }

    onMounted(loadApps);

    return {
      appList,
      selectedAppId,
      list,
      dialogVisible,
      editMode,
      form,
      openAddDialog,
      editRow,
      submitForm,
      deleteRow,
      loadList
    };
  }
}).use(ElementPlus).mount('#app');
</script>

</body>
</html>
