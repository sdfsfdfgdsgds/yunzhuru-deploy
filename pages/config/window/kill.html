<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>通杀弹窗配置</title>
  <link rel="stylesheet" href="/element/css/index.css">
  <script src="/element/js/vue.global.js"></script>
  <script src="/element/js/index.full.js"></script>
</head>
<body>
<div id="app" style="padding: 20px;">
<el-alert
  title="功能说明"
  type="info"
  show-icon
  style="margin-bottom: 20px"
  description="通杀弹窗用于一键关闭所有指定类型的系统弹窗。适用于全面屏蔽无用提示、旧版浮窗、Toast 等。">
</el-alert>
  <div style="margin-bottom: 20px; display: flex; gap: 10px">
    <el-select v-model="selectedAppId" placeholder="选择应用" style="width: 300px" @change="loadList">
      <el-option v-for="app in appList" :key="app.id" :label="`${app.name} | ${app.version}`" :value="app.id"></el-option>
    </el-select>
    <el-button type="default" @click="loadApps">刷新应用列表</el-button>
    <el-button type="primary" @click="openAddDialog">添加通杀类型</el-button>
  </div>

  <el-table :data="killList" border style="width: 100%">
    <el-table-column label="ID" prop="id" width="80"></el-table-column>
    <el-table-column label="类型编码" prop="popup_code" width="120"></el-table-column>
    <el-table-column label="说明" prop="description"></el-table-column>
    <el-table-column label="创建时间" prop="created_at" width="180"></el-table-column>
    <el-table-column label="操作" width="120">
      <template v-slot="scope">
        <el-button size="small" type="danger" @click="deleteRow(scope.row)">删除</el-button>
      </template>
    </el-table-column>
  </el-table>

  <el-dialog v-model="dialogVisible" title="添加通杀类型">
    <el-form :model="form" label-width="100px">
      <el-form-item label="弹窗类型">
        <el-select v-model="form.popup_id" placeholder="选择类型">
          <el-option v-for="item in popupTypes" :key="item.id" :label="`${item.popup_id} - ${item.description}`" :value="item.id"></el-option>
        </el-select>
      </el-form-item>
    </el-form>
    <template #footer>
      <el-button @click="dialogVisible = false">取消</el-button>
      <el-button type="primary" @click="submitForm">确定</el-button>
    </template>
  </el-dialog>
</div>

<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const appList = ref([]);
    const selectedAppId = ref(null);
    const killList = ref([]);
    const popupTypes = ref([]);
    const dialogVisible = ref(false);
    const form = reactive({ popup_id: null });

    async function loadApps() {
      const res = await fetch('/api/index.php?module=config&method=getMyApps');
      const json = await res.json();
      if (json.code === 200) appList.value = json.data;
    }

    async function loadPopupTypes() {
      const res = await fetch('/api/index.php?module=popup_kill&method=getPopupTypes');
      const json = await res.json();
      if (json.code === 200) popupTypes.value = json.data;
    }

    async function loadList() {
      if (!selectedAppId.value) return;
      const res = await fetch('/api/index.php?module=popup_kill&method=getKillList', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apk_id: selectedAppId.value })
      });
      const json = await res.json();
      killList.value = json.data || [];
    }

    function openAddDialog() {
        if (!selectedAppId.value) {
            ElementPlus.ElMessage.warning('请先选择应用');
            return;
          }
      form.popup_id = null;
      dialogVisible.value = true;
    }

    async function submitForm() {
      if (!form.popup_id || !selectedAppId.value) {
        ElementPlus.ElMessage.error('请选择应用和弹窗类型');
        return;
      }

      const res = await fetch('/api/index.php?module=popup_kill&method=addKill', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          apk_id: selectedAppId.value,
          popup_id: form.popup_id
        })
      });
      const json = await res.json();
      if (json.code === 200) {
        ElementPlus.ElMessage.success(json.message || '添加成功');
        dialogVisible.value = false;
        loadList();
      } else {
        ElementPlus.ElMessage.error(json.message || '操作失败');
      }
    }

    async function deleteRow(row) {
      await ElementPlus.ElMessageBox.confirm('确定删除该记录？', '警告');
      await fetch('/api/index.php?module=popup_kill&method=deleteKill', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: row.id })
      });
      loadList();
    }

    onMounted(() => {
      loadApps();
      loadPopupTypes();
    });

    return {
      appList,
      selectedAppId,
      killList,
      dialogVisible,
      popupTypes,
      form,
      openAddDialog,
      submitForm,
      deleteRow,
      loadApps,
      loadList
    };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
